</head>
<body>
    <header class="header_principal">
        <nav class="nav">
            <ul class="nav__lista">
                <li class="nav__item">
                    <a href="catalogoflex.html" class="nav__link">
                        ICONO
                    </a>
                </li>
                <li class="nav__item">
                    <a href="index.html" class="nav__link link--contenido">MENU</a>

                <li class="nav__item">
                    <a href="tiendas.html" class="nav__link link--contenido">TIENDAS</a>

                <li class="nav__item menu--sesion ">
                    <a href="iniciar_sesion.html" class="nav__link link--sesion">Iniciar Sesion</a>

                <li class="nav__item " >
                    <a href="registrarse.html" class="nav__link link--sesion">Registrarse</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main_sesionregistrarse">
        <h1>
            STARBUCKS® REWARDS
        </h1>
        <form action="" class="form" id="form_registro">

            <div class="form__encabezado">
                <img class ="img_icono" src="https://cdn-icons-png.flaticon.com/256/11746/11746380.png" alt="">
                <h2>
                    Datos Personales
                </h2>
            </div>   
            <div class="form__cuerpo">
                <div class="form_dato">
                    <label class="form_label"> Nombres:
                        <input name="nombre" class="input" type="text" placeholder="Juan Fernando">
                    </label>
                </div>
                <div class="form_dato">
                    <label class="form_label"> Apellidos:
                        <input name = "apellido" class="input" type="text" placeholder="Diaz Perez">
                    </label>
                </div>
                <div class="form_dato">
                    <label class="form_label"> Numero de Celular:
                        <input name ="celular" class="input" type="text" placeholder="+51 987654321">
                    </label>
                </div>
                <div class="form_dato">
                    <label class="form_label"> Usuario:
                        <input name="usuario" class="input" type="text" placeholder="Example....">
                    </label>
                </div>
                <div class="form_dato">
                    <label class="form_label"> Contraseña:
                        <input name="password" class="input" type="text" placeholder="************">
                    </label>
                </div>
        
                <div class="form_button">
                        <button class="button" type="submit" >Registrarse</button> 
                </div>
            </div>

        </form>
    </main>

<script src="registrarse.js"></script>
<script src="prueba.js"></script>
</body>
</html>
