    <main class="main_sesionregistrarse">
        <h1>
            STARBUCKS® REWARDS
        </h1>
        <form action="" class="form">

            <div class="form__encabezado">
                <img class ="img_icono" src="https://cdn-icons-png.flaticon.com/512/1000/1000946.png" alt="">
                <h2>
                    Iniciar Sesion
                </h2>
            </div>   
            <div class="form__cuerpo">
                <div class="form_dato">
                    <label class="form_label"> Correo Electronico
                        <input name="usuario" class="input" type="text" placeholder="Correo o Numero de telefono">
                    </label>
                </div>
                <div class="form_dato">
                    <label class="form_label"> Contraseña
                        <input name="contraseña" class="input" type="password" placeholder="Password">
                    </label>
                </div>
                <div class="form_dato form_checkbox"> 
                    <input class="checkbox" type="checkbox" >
                    <label class="form_label"> Recordar Usuario y Contraseña
                    </label>
                </div>
                <div class="form_button">
                        <button class="button" type="submit" >Iniciar Sesion</button> 
                </div>
            </div>                                                                          
        </form>
    </main>
